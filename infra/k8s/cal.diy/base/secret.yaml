# TODO before apply: replace placeholder values and, ideally, swap this
# resource for a SealedSecret or ExternalSecret backed by your secrets store.
# All values below must be base64-encoded when shipped as `data:` (shown here
# as plain strings via `stringData:` for readability — kubectl encodes on apply).
apiVersion: v1
kind: Secret
metadata:
  name: cal-diy-secrets
  namespace: cal-diy
type: Opaque
stringData:
  # Postgres (matches postgres-statefulset.yaml POSTGRES_PASSWORD)
  CAL_DB_PASSWORD: REPLACE_WITH_GENERATED_PASSWORD

  # cal.diy core secrets
  # openssl rand -base64 32
  NEXTAUTH_SECRET: REPLACE_WITH_RANDOM_32_BYTES
  # openssl rand -hex 16  (must be exactly 32 characters)
  CALENDSO_ENCRYPTION_KEY: REPLACE_WITH_32_HEX_CHARS

  # Webhook signing — MUST match CALCOM_WEBHOOK_SECRET on the mintax side
  # openssl rand -hex 32
  CALCOM_WEBHOOK_SECRET: REPLACE_WITH_HEX_32_BYTES

  # SMTP password for outbound booking emails
  EMAIL_SERVER_PASSWORD: REPLACE_WITH_SMTP_PASSWORD

  # Filled AFTER first boot: Settings -> Developer -> API Keys inside cal.diy
  CALCOM_ADMIN_API_KEY: ""
